<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gestion des apprenants</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 800px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }

    th {
      background: #eee;
    }

    #status {
      margin: 20px;
    }

    .qr {
      margin-top: 10px;
    }

    button {
      cursor: pointer;
      padding: 5px 10px;
    }

  </style>

</head>


<body>


<h2>👥 Liste des apprenants</h2>

<h3>➕ Nouvel apprenant</h3>

<input id="nom" placeholder="Nom">

<input id="prenom" placeholder="Prénom">

<input id="groupe" placeholder="Groupe">

<button onclick="creerApprenant()">
  Créer
</button>

<p id="creationStatus"></p>
<p id="status">
Chargement...
</p>


<table>

<thead>

<tr>

<th>ID</th>
<th>Nom</th>
<th>Prénom</th>
<th>Groupe</th>
<th>QR</th>

</tr>

</thead>


<tbody id="listeApprenants">

</tbody>


</table>



<script type="module">


const API_URL =
"https://gestion-presences-56vd.onrender.com";



async function genererQR(apprenantId) {

  const container =
    document.getElementById("qr-" + apprenantId);


  container.innerHTML = "Génération...";


  try {

    const response = await fetch(
      `${API_URL}/apprenants/${apprenantId}/qr`,
      {
        method:"POST"
      }
    );


    const data = await response.json();


    console.log(
      "QR reçu :",
      data
    );


    container.innerHTML="";


    new QRCode(
      container,
      {
        text:data.qr_code,
        width:180,
        height:180
      }
    );


  }
  catch(error){

    console.error(error);

    container.innerHTML =
      "Erreur génération QR";

  }

}




async function chargerApprenants() {


  try {


    const response = await fetch(
      `${API_URL}/apprenants`
    );


    const apprenants =
      await response.json();



    console.log(
      "Apprenants reçus :",
      apprenants
    );



    const tbody =
      document.getElementById(
        "listeApprenants"
      );



    tbody.innerHTML =
      apprenants.map(a => `

        <tr>

          <td>${a.id}</td>

          <td>${a.nom}</td>

          <td>${a.prenom}</td>

          <td>${a.groupe ?? ""}</td>

          <td>

            <button
              onclick="genererQR('${a.id}')">
              📱 QR
            </button>

            <div
              class="qr"
              id="qr-${a.id}">
            </div>

          </td>

        </tr>

      `).join("");



    document.getElementById(
      "status"
    ).innerText =
      `${apprenants.length} apprenant(s)`;


  }


  catch(error) {


    console.error(error);


    document.getElementById(
      "status"
    ).innerText =
      "Erreur chargement apprenants";


  }


}



window.genererQR = genererQR;


chargerApprenants();


</script>


</body>

</html>
