<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gestion des apprenants</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 900px;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 10px;
    }

    th {
      background: #eee;
    }

    input {
      padding: 6px;
      margin: 4px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
    }

    .qr {
      margin-top: 10px;
    }
  </style>

</head>

<body>

  <h2>👥 Liste des apprenants</h2>
  <h3>➕ Nouvel apprenant</h3>
  <input id="nom" placeholder="Nom">
  <input id="prenom" placeholder="Prénom">
  <input id="groupe" placeholder="Groupe">

  <button onclick="creerApprenant()">
    Créer
  </button>
  <p id="creationStatus"></p>
  <p id="status">
    Chargement...
  </p>

  <table>

    <thead>

      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Groupe</th>
        <th>QR</th>
      </tr>

    </thead>

    <tbody id="listeApprenants">
    </tbody>

  </table>

  <script type="module">

    // const API_URL = "https://gestion-presences-56vd.onrender.com";
    // const API_URL = "http://localhost:3000";
    import { API_URL } from "./js/config.js";

    // ===================================================
    // Création apprenant
    // ===================================================

    async function creerApprenant() {
      const nom = document.getElementById("nom").value.trim();
      const prenom = document.getElementById("prenom").value.trim();
      const groupe = document.getElementById("groupe").value.trim();

      if (!nom || !prenom) {
        document.getElementById("creationStatus").innerText =
          "Nom et prénom obligatoires.";
        return;
      }

      try {
        const response = await fetch(
          `${API_URL}/apprenants`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              nom,
              prenom,
              groupe
            })
          }
        );

        const data = await response.json();

        console.log(data);

        document.getElementById("creationStatus").innerText =
          "✅ Apprenant créé";

        document.getElementById("nom").value = "";
        document.getElementById("prenom").value = "";
        document.getElementById("groupe").value = "";

        chargerApprenants();

      }

      catch (error) {

        console.error(error);
        document.getElementById("creationStatus").innerText =
          "Erreur création";

      }

    }


    // ===================================================
    // Génération QR
    // ===================================================

    async function genererQR(apprenantId) {

      console.log("GENERATION QR APPELEE :", apprenantId);

      const container =
        document.getElementById("qr-" + apprenantId);

      container.innerHTML = "Génération...";

      try {
        console.log("ID ENVOYE AU BACKEND :", apprenantId);
        const response = await fetch(
          `${API_URL}/apprenants/${apprenantId}/qr`,
          {
            method: "POST"
          }
        );

        const data = await response.json();
        console.log("REPONSE BACKEND QR :", data);

        container.innerHTML = "";

        new QRCode(
          container,
          {
            text: JSON.stringify(data.qr_payload),
            width: 180,
            height: 180
          }
        );

      }

      catch (error) {
        console.error(error);
        container.innerHTML =
          "Erreur";
      }

    }


    // ===================================================
    // Chargement liste
    // ===================================================

    async function chargerApprenants() {
      try {
        const response =
          await fetch(`${API_URL}/apprenants`);

        const apprenants =
          await response.json();

        const tbody =
          document.getElementById("listeApprenants");

        tbody.innerHTML =
          apprenants.map(a => `

<tr>

<td>${a.id}</td>
<td>${a.nom}</td>
<td>${a.prenom}</td>
<td>${a.groupe ?? ""}</td>
<td>
<button onclick="genererQR('${a.id}')">
📱 QR
</button>
<div
class="qr"
id="qr-${a.id}">
</div>
</td>
</tr>

`).join("");
        document.getElementById("status").innerText =
          apprenants.length + " apprenant(s)";
      }
      catch (error) {
        console.error(error);
        document.getElementById("status").innerText =
          "Erreur chargement";
      }

    }


    window.genererQR = genererQR;
    window.creerApprenant = creerApprenant;

    chargerApprenants();

  </script>

</body>

</html>
