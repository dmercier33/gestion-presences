<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des présences - Formateur</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Librairie QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>

<body>

    <div class="container">

        <h1>📋 Gestion des présences</h1>

        <button id="btnNewSession">➕ Nouvelle session</button>

        <div class="card">

            <h2>Session active</h2>

            <div id="sessionInfo">Aucune session</div>

            <canvas id="qrCanvas"></canvas>

        </div>

        <div class="card">

            <h2>Présences</h2>

            <div id="presenceCount">0 apprenant</div>

        </div>

    </div>

    <script type="module" src="js/formateur.js"></script>

</body>
</html>
