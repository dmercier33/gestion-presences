<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner Présence</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body {
  font-family: Arial, sans-serif;
  text-align:center;
  padding:20px;
}

#reader {
  width:100%;
  max-width:400px;
  margin:auto;
}

#status {
  margin-top:20px;
  font-size:18px;
  white-space:pre-line;
}

#debug {
  margin-top:20px;
  padding:10px;
  border:1px solid #ccc;
  text-align:left;
  white-space:pre-line;
  font-size:14px;
}

</style>

</head>


<body>


<h2>📷 Scanner présence</h2>


<div id="reader"></div>


<p id="status">
En attente du QR...
</p>


<div id="debug">
DEBUG :
</div>


<script type="module">


import { registerPresence } from "./js/api.js";


console.log("scanner v0.3.5 chargé");


// ======================================
// SESSION ACTIVE
// ======================================


let sessionId =
    localStorage.getItem("sessionId");


debug(
  "SESSION AU CHARGEMENT :\n" +
  sessionId
);


console.log(
    "SESSION ACTIVE :",
    sessionId
);



let apprenantId = null;

let isScanning = true;



// ======================================
// DEBUG MOBILE
// ======================================


function debug(message) {

    document.getElementById("debug").innerText +=
        "\n" + message;

}



// ======================================
// Enregistrement présence
// ======================================


async function enregistrerPresence(){


  debug(
    "CONTROLE PRESENCE\n" +
    "sessionId = " + sessionId +
    "\napprenantId = " + apprenantId
  );


  if(!sessionId || !apprenantId){

    debug(
      "PRESENCE ABANDONNEE : donnée manquante"
    );

    return;

  }


  debug(
    "ENVOI AU SERVEUR..."
  );


  try{


    const result =
      await registerPresence(
        sessionId,
        apprenantId
      );


    debug(
      "REPONSE SERVEUR :\n" +
      JSON.stringify(result)
    );


    console.log(
      "Réponse serveur :",
      result
    );



    if(result.status === "ok"){


      document.getElementById("status").innerText =
        "✅ Présence enregistrée";


    }
    else {


      document.getElementById("status").innerText =
        "❌ " + JSON.stringify(result);


    }



    apprenantId = null;



  }


  catch(error){


    console.error(error);


    debug(
      "ERREUR : " + error.message
    );


    document.getElementById("status").innerText =
      "❌ Erreur serveur";


  }


}




// ======================================
// Lecture QR
// ======================================


function onScanSuccess(decodedText){



  if(!isScanning){

    return;

  }



  isScanning=false;



  let data=null;



  // QR apprenant

  if(decodedText.startsWith("APP_")){


    data={

      type:"APPRENANT",

      id:decodedText

    };


  }


  else {


    try{

      data=JSON.parse(decodedText);

    }

    catch(e){


      document.getElementById("status").innerText =
        "❌ QR invalide";


      isScanning=true;

      return;

    }


  }



  console.log(
    "QR lu :",
    data
  );



  debug(
    "QR LU :\n" +
    JSON.stringify(data)
  );





  // ==========================
  // QR APPRENANT
  // ==========================


  if(data.type==="APPRENANT"){



    apprenantId=data.id;



    document.getElementById("status").innerText =
      "✅ Apprenant reconnu : "
      + apprenantId
      + "\nSession : "
      + sessionId;



    if(sessionId){


      enregistrerPresence();


    }
    else{


      document.getElementById("status").innerText +=
        "\n⚠️ En attente de la session";


    }



    isScanning=true;


    return;


  }






  // ==========================
  // QR SESSION (conservé)
  // ==========================


  if(data.type==="SESSION"){



    sessionId=data.sessionId;


    localStorage.setItem(
      "sessionId",
      sessionId
    );



    debug(
      "SESSION QR RECUE :\n" +
      sessionId
    );



    document.getElementById("status").innerText =
      "✅ Session reconnue : "
      + sessionId;



    if(apprenantId){


      enregistrerPresence();


    }



    isScanning=true;

    return;


  }





  document.getElementById("status").innerText =
    "❌ QR inconnu";


  isScanning=true;



}




// ======================================
// Démarrage caméra
// ======================================


const html5QrCode =
  new Html5Qrcode("reader");



html5QrCode.start(

  {
    facingMode:"environment"
  },

  {
    fps:10,
    qrbox:250
  },

  onScanSuccess

)


.catch(err=>{


  console.error(
    "Erreur caméra",
    err
  );


  document.getElementById("status").innerText =
    "Erreur caméra : " + err;


});



</script>


</body>

</html>
