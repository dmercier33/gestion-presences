<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner Présence</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body {
  font-family: Arial, sans-serif;
  text-align:center;
  padding:20px;
}

#reader {
  width:100%;
  max-width:400px;
  margin:auto;
}

#status {
  margin-top:20px;
  font-size:18px;
  white-space:pre-line;
}

</style>

</head>


<body>


<h2>📷 Scanner présence</h2>


<div id="reader"></div>


<p id="status">
En attente du QR...
</p>



<script type="module">


import { registerPresence } from "./js/api.js";


console.log("scanner v0.3.4 chargé");



let sessionId = localStorage.getItem("sessionId");

let apprenantId = null;

let isScanning = true;

console.log(
  "Session active :",
  sessionId
);

// ======================================
// Enregistrement présence
// ======================================

async function enregistrerPresence(){


  if(!sessionId || !apprenantId){

    return;

  }


  console.log(
    "Enregistrement présence :",
    sessionId,
    apprenantId
  );


  try{


    const result =
      await registerPresence(
        sessionId,
        apprenantId
      );


    console.log(
      "Réponse serveur :",
      result
    );


    if(result.status === "ok"){


      document.getElementById("status").innerText =
        "✅ Présence enregistrée";


    }
    else {


      document.getElementById("status").innerText =
        "❌ " + JSON.stringify(result);


    }



    sessionId = null;

    apprenantId = null;



  }

  catch(error){


    console.error(error);


    document.getElementById("status").innerText =
      "❌ Erreur serveur";


  }


}



// ======================================
// Lecture QR
// ======================================

function onScanSuccess(decodedText){


  if(!isScanning){

    return;

  }


  isScanning=false;



  let data=null;



  // Nouveau QR apprenant v0.3.3

  if(decodedText.startsWith("APP_")){


    data={

      type:"APPRENANT",

      id:decodedText

    };


  }


  else {


    try{


      data=JSON.parse(decodedText);


    }

    catch(e){


      document.getElementById("status").innerText =
        "❌ QR invalide";


      isScanning=true;

      return;


    }


  }



  console.log(
    "QR lu :",
    data
  );




  // ==========================
  // QR APPRENANT
  // ==========================


  if(data.type==="APPRENANT"){


    apprenantId=data.id;



    document.getElementById("status").innerText =
      "✅ Apprenant reconnu : "
      + apprenantId
      + "\nSession : "
      + sessionId;



    if(sessionId){


      enregistrerPresence();


    }
    else{


      document.getElementById("status").innerText +=
        "\n⚠️ En attente de la session";


    }



    isScanning=true;


    return;


  }





  // ==========================
  // QR SESSION
  // ==========================


  if(data.type==="SESSION"){



    sessionId=data.sessionId;
    console.log("SESSION STOCKEE =", sessionId);


    document.getElementById("status").innerText =
      "✅ Session reconnue : "
      + sessionId;



    if(apprenantId){


      enregistrerPresence();


    }



console.log("FIN SCAN SESSION - sessionId =", sessionId);

isScanning=true;
return;


  }




  document.getElementById("status").innerText =
    "❌ QR inconnu";


  isScanning=true;


}



// ======================================
// Démarrage caméra
// ======================================


const html5QrCode =
  new Html5Qrcode("reader");



html5QrCode.start(

  {
    facingMode:"environment"
  },

  {
    fps:10,
    qrbox:250
  },

  onScanSuccess

)

.catch(err=>{


  console.error(
    "Erreur caméra",
    err
  );


  document.getElementById("status").innerText =
    "Erreur caméra : " + err;


});



</script>


</body>

</html>
