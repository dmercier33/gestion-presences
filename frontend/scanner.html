<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Scanner Présence</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    #reader {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h2>📷 Scanner présence</h2>

<div id="reader"></div>

<p id="status">En attente du QR...</p>


<script>

let isScanning = true;


const API_URL = "https://gestion-presences-56vd.onrender.com";


function onScanSuccess(decodedText) {

  if (!isScanning) return;

  isScanning = false;


  document.getElementById("status").innerText =
    "QR détecté...";


  let data;


  try {

    data = JSON.parse(decodedText);

  } catch(e) {

    document.getElementById("status").innerText =
      "QR invalide";

    isScanning = true;
    return;
  }


  console.log("QR lu :", data);


  fetch(`${API_URL}/api/presences`, {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({

      sessionId: data.sessionId,

      apprenantId: "APP-0001"

    })

  })


  .then(res => res.json())


  .then(result => {

    console.log("Réponse serveur :", result);


    if (result.status === "ok") {

      document.getElementById("status").innerText =
        "✅ Présence enregistrée";

    } else {

      document.getElementById("status").innerText =
        "❌ " + JSON.stringify(result);

    }


    setTimeout(() => {

      isScanning = true;

      document.getElementById("status").innerText =
        "En attente du QR...";

    }, 3000);

  })


  .catch(err => {

    console.error(err);

    document.getElementById("status").innerText =
      "Erreur serveur";

    isScanning = true;

  });

}



const html5QrCode = new Html5Qrcode("reader");


html5QrCode.start(

  { facingMode: "environment" },

  {
    fps: 10,
    qrbox: 250
  },

  onScanSuccess

)

.catch(err => {

  document.getElementById("status").innerText =
    "Erreur caméra : " + err;

});

</script>


</body>
</html>
