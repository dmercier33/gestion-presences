<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Gestion Présences - Formateur</title>
</head>

<body>

<h1>Ouverture d'une session</h1>

<label>
Groupe :
</label>

<input 
id="groupeId"
value="GRP_TEST_001"
/>

<br><br>

<label>
Durée (minutes) :
</label>

<input 
id="duration"
type="number"
value="120"
/>

<br><br>

<button onclick="openSession()">
Créer la session
</button>

<pre id="result"></pre>

<script>
async function openSession(){

    const groupe_id =
document.getElementById("groupeId").value;

const duration_minutes =
Number(document.getElementById("duration").value);

const response = await fetch("/sessions", {

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
groupe_id,
duration_minutes
})

});

const data = await response.json();

document.getElementById("result").textContent =
JSON.stringify(data,null,2);

}
</script>

</body>

</html>
