<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>QR Apprenant</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
        }

        #qrcode {
            margin: 30px auto;
            width: 250px;
        }
    </style>
</head>

<body>

<h1>QR Apprenant</h1>

<p>
    Alain DUPONT<br>
    APP-0001
</p>

<div id="qrcode"></div>


<script>

const apprenant = {
    type: "APPRENANT",
    id: "APP-0001"
};


const qrData = JSON.stringify(apprenant);


new QRCode(
    document.getElementById("qrcode"),
    {
        text: qrData,
        width: 250,
        height: 250
    }
);


console.log("QR généré :", qrData);

</script>


</body>

</html>
